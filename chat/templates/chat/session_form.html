    <h1>Create New Session</h1>

    <form method="post" action="{% url 'session_create' %}">
        {% csrf_token %}

        <label for="name">Session Name (optional):</label>
        <input type="text" id="name" name="name" placeholder="Leave blank for default 'New chat'">

        <button type="submit">Create Session</button>
    </form>

    <a href="{% url 'home' %}">Cancel</a>

{% endblock %}
