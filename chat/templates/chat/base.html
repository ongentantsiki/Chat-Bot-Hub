<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>ChatBot Hub</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 0 auto; padding: 20px; }
    .msg { padding: 10px; margin: 8px 0; border-radius: 8px; }
    .user { background: #e0f2fe; }
    .assistant { background: #dcfce7; }
  </style>
</head>
<body>
  <nav>
    {% if user.is_authenticated %}
      <a href="{% url 'home' %}">Sesje</a> |
      <a href="{% url 'session_create' %}">Nowa sesja</a> |
      <span>Logged in as: {{ user.username }}</span> <!-- addition optional--> 
      <a href="{% url 'logout' %}">Wyloguj</a>
    {% else %}
      <a href="{% url 'login' %}">Zaloguj się</a> |
      <a href="{% url 'register' %}">Rejestracja</a>
    {% endif %}
  </nav>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
